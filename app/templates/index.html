<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Batocera ROM Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/drone.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid layout-shell py-3 py-lg-4">
  <div class="sidebar rounded-3 p-2 p-md-3 mb-3">
    <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 gap-lg-3">
      <div class="d-flex align-items-center gap-2 me-lg-auto">
        <span class="brand-mark"><img src="/content/batocera-swarm-mascot.jpg" alt="Batocera Fleet Federation mascot"></span>
        <div>
          <div class="h5 mb-0 text-white">Batocera Drone</div>
        </div>
      </div>
      <div class="nav-actions">
        <a id="systemsMenuBtn" href="#" role="button" class="btn"><i class="bi bi-grid me-2"></i>Systems</a>
        <a id="biosBtn" href="#bios" role="button" class="btn"><i class="bi bi-cpu me-2"></i>BIOS</a>
        <a id="themeMenuBtn" href="#theme" role="button" class="btn"><i class="bi bi-brush me-2"></i>Theme</a>
        <a id="systemInfoMenuBtn" href="#admin/system-info" role="button" class="btn"><i class="bi bi-pc-display me-2"></i>System Info</a>
        <a id="adminMenuBtn" href="#admin" role="button" class="btn"><i class="bi bi-shield-check me-2"></i>Admin</a>
        <a href="https://github.com/Batocera-Fleet-Federation/batocera.drone" target="_blank" rel="noopener noreferrer" role="button" class="btn">
          <i class="bi bi-github me-2"></i>GitHub
        </a>
      </div>
    </div>
  </div>
  <div class="d-none">
    <h1 class="h3 mb-1"></h1>
    <div id="pageSubtitle" class="text-muted"></div>
  </div>
  <main>
    <div class="app-shell p-3 p-md-4">
      <div id="systemInfoBar" class="mb-3 d-flex flex-wrap gap-2"></div>
      <div class="mb-3">
        <form id="searchForm" role="search">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input id="searchInput" class="form-control" type="search" placeholder="Search ROMs across all systems">
            <button id="searchBtn" class="btn btn-primary" type="submit">Search</button>
            <button id="clearSearchBtn" class="btn btn-outline-secondary" type="button">Clear</button>
          </div>
        </form>
      </div>
      <div id="content"></div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/drone.js"></script>
</body>
</html>
