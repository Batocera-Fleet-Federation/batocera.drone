<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Batocera ROM Browser</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .tile { height: 100%; }
    .pointer { cursor: pointer; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .truncate-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 3em;
    }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h3 mb-1">Batocera Library</h1>
      <div class="text-muted">Systems and ROMs</div>
    </div>
    <div class="d-flex gap-2">
      <button id="biosBtn" class="btn btn-outline-primary">BIOS</button>
      <button id="backBtn" class="btn btn-outline-secondary d-none">Back</button>
    </div>
  </div>

  <form id="searchForm" class="mb-3" role="search">
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input id="searchInput" class="form-control" type="search" placeholder="Search ROMs across all systems">
      <button id="searchBtn" class="btn btn-primary" type="submit">Search</button>
      <button id="clearSearchBtn" class="btn btn-outline-secondary" type="button">Clear</button>
    </div>
  </form>

  <div id="alerts"></div>
  <div id="loading" class="d-none mb-3 text-muted"><div class="spinner-border spinner-border-sm me-2" role="status"></div><span id="loadingText">Loading...</span></div>
  <div id="content"></div>

  <footer class="mt-4 pt-3 border-top text-muted small">
    <a href="/downloads">Download Sitemap</a>
  </footer>
</div>

<script>
const content = document.getElementById("content");
const alerts = document.getElementById("alerts");
const backBtn = document.getElementById("backBtn");
const biosBtn = document.getElementById("biosBtn");
const searchForm = document.getElementById("searchForm");
const searchInput = document.getElementById("searchInput");
const clearSearchBtn = document.getElementById("clearSearchBtn");
const loading = document.getElementById("loading");
const loadingText = document.getElementById("loadingText");
let imageObserver = null;

function showError(message) {
  alerts.innerHTML = `<div class="alert alert-danger">${message}</div>`;
}
function clearError() {
  alerts.innerHTML = "";
}
function setLoading(isLoading, text = "Loading...") {
  if (isLoading) {
    loadingText.textContent = text;
    loading.classList.remove("d-none");
  } else {
    loading.classList.add("d-none");
  }
}
function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
async function api(url) {
  const res = await fetch(url, { credentials: "same-origin" });
  if (!res.ok) {
    let msg = `Request failed: ${res.status}`;
    try {
      const data = await res.json();
      if (data.error) msg = data.error;
    } catch (_) {}
    throw new Error(msg);
  }
  return await res.json();
}
function setHash(hash) {
  window.location.hash = hash;
}
function romDownloadUrl(system, uniqueId) {
  return `/systems/${encodeURIComponent(system)}/${encodeURIComponent(uniqueId)}`;
}
function biosDownloadUrl(uniqueId) {
  return `/bios/${encodeURIComponent(uniqueId)}`;
}
function publicRomImageUrl(system, romName, imageStem, suffix = ".png", withImageSuffix = true) {
  const stem = imageStem || (() => {
    const lastDot = romName.lastIndexOf(".");
    return lastDot >= 0 ? romName.substring(0, lastDot) : romName;
  })();
  const imageFile = withImageSuffix ? `${stem}-image${suffix}` : `${stem}${suffix}`;
  return `/public/systems/${encodeURIComponent(system)}/images/${encodeURIComponent(imageFile)}`;
}
function romImageByIdUrl(system, uniqueId) {
  return `/systems/${encodeURIComponent(system)}/images/${encodeURIComponent(uniqueId)}`;
}
function loadRomCardImage(img) {
  if (!img || img.dataset.loaded === "1") return;
  const primarySrc = img.dataset.src;
  let fallbackCandidates = [];
  try {
    fallbackCandidates = JSON.parse(img.dataset.fallbacks || "[]");
  } catch (_) {
    fallbackCandidates = [];
  }
  if (!primarySrc) return;

  img.onerror = function () {
    const next = fallbackCandidates.shift();
    if (next) {
      this.src = next;
      return;
    }
    this.onerror = null;
  };
  img.src = primarySrc;
  img.dataset.loaded = "1";
}
function setupLazyImages() {
  if (imageObserver) {
    imageObserver.disconnect();
    imageObserver = null;
  }

  const lazyImages = Array.from(document.querySelectorAll("img[data-src]"));
  if (!lazyImages.length) return;

  if (!("IntersectionObserver" in window)) {
    lazyImages.forEach(loadRomCardImage);
    return;
  }

  imageObserver = new IntersectionObserver((entries, observer) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      const img = entry.target;
      loadRomCardImage(img);
      observer.unobserve(img);
    });
  }, { rootMargin: "200px 0px" });

  lazyImages.forEach((img) => imageObserver.observe(img));
}
function renderSystems(data) {
  backBtn.classList.add("d-none");
  const systems = data.systems || [];
  content.innerHTML = `
    <div class="row g-3">
      ${systems.map(system => `
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
          <div class="card shadow-sm tile pointer" onclick="setHash('#system/${encodeURIComponent(system.name)}')">
            <div class="card-body">
              <h2 class="h5 card-title mb-2"><i class="bi bi-controller me-2"></i>${escapeHtml(system.name)}</h2>
              <div class="text-muted"><i class="bi bi-collection-play me-1"></i>ROMs: ${system.rom_count}</div>
            </div>
          </div>
        </div>
      `).join("")}
    </div>
  `;
  setupLazyImages();
}
function renderRomGrid(system, items) {
  return `
    <div class="mb-4">
      <h3 class="h5 mb-3">ROMs <span class="text-muted">(${items.length})</span></h3>
      <div class="row g-3">
        ${items.map(item => {
          const fallbacks = [
            publicRomImageUrl(system, item.name, item.image_stem, ".png", true),
            publicRomImageUrl(system, item.name, item.image_stem, ".jpg", true),
            publicRomImageUrl(system, item.name, item.image_stem, ".jpeg", true),
            publicRomImageUrl(system, item.name, item.image_stem, ".webp", true),
            publicRomImageUrl(system, item.name, item.image_stem, ".png", false),
            publicRomImageUrl(system, item.name, item.image_stem, ".jpg", false),
            publicRomImageUrl(system, item.name, item.image_stem, ".jpeg", false),
            publicRomImageUrl(system, item.name, item.image_stem, ".webp", false),
          ];
          return `
          <div class="col-12 col-md-6 col-xl-4">
            <div class="card shadow-sm tile h-100">
              <img
                src=""
                data-src="${romImageByIdUrl(system, item.unique_id)}"
                data-fallbacks='${JSON.stringify(fallbacks)}'
                class="card-img-top"
                alt="${escapeHtml(item.name)}"
                style="height: 220px; object-fit: contain; background: #111;"
                loading="lazy"
              >
              <div class="card-body d-flex flex-column">
                <div class="fw-semibold truncate-2 mb-2">${escapeHtml(item.name)}</div>
                ${item.byte_count !== undefined ? `<div class="text-muted small mono mb-3">${item.byte_count} bytes</div>` : ""}
                <div class="mt-auto">
                  ${
                    item.is_downloadable === false
                      ? `<button class="btn btn-secondary btn-sm" type="button" disabled><i class="bi bi-folder2-open me-1"></i>Folder ROM (No Download)</button>`
                      : `<a class="btn btn-primary btn-sm" href="${romDownloadUrl(system, item.unique_id)}"><i class="bi bi-download me-1"></i>Download</a>`
                  }
                </div>
              </div>
            </div>
          </div>
        `;
        }).join("") || `<div class="col-12"><div class="text-muted">No roms found.</div></div>`}
      </div>
    </div>
  `;
}
function renderBiosList(data) {
  backBtn.classList.remove("d-none");
  const entries = data.bios || [];
  const files = entries.filter((entry) => entry.entry_type === "file");
  const grouped = {};

  files.forEach((item) => {
    const path = item.path || item.name || "";
    const firstSegment = path.includes("/") ? path.split("/")[0] : "_root";
    if (!grouped[firstSegment]) grouped[firstSegment] = [];
    grouped[firstSegment].push(item);
  });

  const systems = Object.keys(grouped).sort((a, b) => a.localeCompare(b));
  content.innerHTML = `
    <div class="mb-3">
      <h2 class="h4 mb-1"><i class="bi bi-cpu me-2"></i>BIOS Files</h2>
      <div class="text-muted">Groups: ${systems.length} · Files: ${files.length}</div>
    </div>
    ${
      systems.length
        ? systems.map((system) => `
          <section class="mb-4">
            <h3 class="h5 mb-2"><i class="bi bi-folder2-open me-2"></i>${escapeHtml(system === "_root" ? "root" : system)} <span class="text-muted">(${grouped[system].length})</span></h3>
            <div class="row g-3">
              ${grouped[system].map((item) => `
                <div class="col-12 col-lg-6">
                  <div class="card shadow-sm tile h-100">
                    <div class="card-body">
                      <div class="fw-semibold mb-2">${escapeHtml(item.name)}</div>
                      ${item.byte_count !== undefined ? `<div class="text-muted small mono mb-3">${item.byte_count} bytes</div>` : ""}
                      ${item.md5 ? `<div class="text-muted small mono mb-3">MD5: ${escapeHtml(item.md5)}</div>` : ""}
                      <a class="btn btn-primary btn-sm" href="${biosDownloadUrl(item.unique_id)}"><i class="bi bi-download me-1"></i>Download BIOS</a>
                    </div>
                  </div>
                </div>
              `).join("")}
            </div>
          </section>
        `).join("")
        : `<div class="text-muted">No BIOS files found.</div>`
    }
  `;
}
function renderSearchResults(data) {
  backBtn.classList.add("d-none");
  const results = data.results || [];
  const grouped = {};
  results.forEach((item) => {
    const key = item.system || "unknown";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(item);
  });
  const systems = Object.keys(grouped).sort((a, b) => a.localeCompare(b));
  content.innerHTML = `
    <div class="mb-3">
      <h2 class="h4 mb-1"><i class="bi bi-binoculars me-2"></i>Search Results</h2>
      <div class="text-muted">Query: "${escapeHtml(data.query || "")}" · Matches: ${results.length} · Systems: ${systems.length}</div>
    </div>
    ${
      systems.length
        ? systems.map((system) => `
          <section class="mb-4">
            <h3 class="h5 mb-2"><i class="bi bi-controller me-2"></i>${escapeHtml(system)} <span class="text-muted">(${grouped[system].length})</span></h3>
            <div class="row g-3">
              ${grouped[system].map(item => `
                <div class="col-12 col-lg-6">
                  <div class="card shadow-sm tile h-100">
                    <div class="card-body">
                      <div class="fw-semibold mb-3">${escapeHtml(item.name)}</div>
                      ${
                        item.is_downloadable === false
                          ? `<button class="btn btn-secondary btn-sm" type="button" disabled><i class="bi bi-folder2-open me-1"></i>Folder ROM (No Download)</button>`
                          : `<a class="btn btn-primary btn-sm" href="${romDownloadUrl(item.system, item.unique_id)}"><i class="bi bi-download me-1"></i>Download</a>`
                      }
                    </div>
                  </div>
                </div>
              `).join("")}
            </div>
          </section>
        `).join("")
        : `<div class="text-muted">No matches found.</div>`
    }
  `;
}
async function renderSystem(system) {
  backBtn.classList.remove("d-none");
  setLoading(true, `Loading ${system} ROMs...`);
  const romsData = await api(`/systems/${encodeURIComponent(system)}`);

  content.innerHTML = `
    <div class="mb-4">
      <h2 class="h4 mb-1">${escapeHtml(system)}</h2>
      <div class="text-muted">
        ROMs: ${(romsData.roms || []).length}
      </div>
    </div>

    ${renderRomGrid(system, romsData.roms || [])}
  `;
  setupLazyImages();
  setLoading(false);
}
async function renderSearch(query) {
  setLoading(true, `Searching for "${query}"...`);
  const data = await api(`/search?q=${encodeURIComponent(query)}`);
  renderSearchResults(data);
  setLoading(false);
}
async function renderBios() {
  setLoading(true, "Loading BIOS files...");
  const data = await api("/bios");
  renderBiosList(data);
  setLoading(false);
}
async function router() {
  clearError();
  try {
    const hash = window.location.hash || "";
    if (hash === "#bios") {
      await renderBios();
    } else if (hash.startsWith("#search/")) {
      const q = decodeURIComponent(hash.substring("#search/".length));
      searchInput.value = q;
      await renderSearch(q);
    } else if (hash.startsWith("#system/")) {
      const system = decodeURIComponent(hash.substring("#system/".length));
      await renderSystem(system);
    } else {
      setLoading(true, "Loading systems...");
      const data = await api("/systems");
      renderSystems(data);
      setLoading(false);
    }
  } catch (err) {
    setLoading(false);
    showError(err.message || "Unexpected error");
  }
}
backBtn.addEventListener("click", () => setHash(""));
biosBtn.addEventListener("click", () => setHash("#bios"));
searchForm.addEventListener("submit", (event) => {
  event.preventDefault();
  const q = (searchInput.value || "").trim();
  if (!q) return;
  setHash(`#search/${encodeURIComponent(q)}`);
});
clearSearchBtn.addEventListener("click", () => {
  searchInput.value = "";
  setHash("");
});
window.addEventListener("hashchange", router);
router();
</script>
</body>
</html>
