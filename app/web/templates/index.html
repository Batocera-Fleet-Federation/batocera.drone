<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Batocera Drone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/drone.css?v={{DRONE_APP_VERSION}}" rel="stylesheet">
</head>
<body>
<div class="container-fluid layout-shell py-3 py-lg-4">
  <div id="managedPeerBanner" class="alert alert-warning d-none d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3" role="alert">
    <span><i class="bi bi-broadcast me-2"></i><span class="managed-peer-banner-text fw-semibold"></span></span>
    <button type="button" class="btn btn-sm btn-outline-dark" onclick="exitRemoteManagement()"><i class="bi bi-x-circle me-1"></i>Disconnect</button>
  </div>
  <div class="sidebar rounded-3 p-2 p-md-3 mb-3">
    <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 gap-lg-3">
      <div class="d-flex align-items-center gap-2 me-lg-auto">
        <span class="brand-mark"><img src="/content/batocera-swarm-mascot.jpg" alt="Batocera Fleet Federation mascot"></span>
        <div class="brand-title-wrap">
          <a id="brandHomeBtn" href="#home" class="h5 mb-0 text-white brand-home-link">Batocera Drone</a>
          <span id="droneVersionBadge" class="drone-version-badge d-none" aria-label="Drone app version"></span>
        </div>
        <span class="resource-links" aria-label="Project resources">
          <a id="apiAccessBtn" href="#admin/api" class="resource-icon-link" title="API Access" aria-label="API Access"><i class="bi bi-braces"></i></a>
          <a href="https://github.com/Batocera-Fleet-Federation/batocera.drone" target="_blank" rel="noopener noreferrer" class="resource-icon-link" title="GitHub" aria-label="GitHub"><i class="bi bi-github"></i></a>
        </span>
      </div>
      <div class="nav-actions">
        <a id="systemsMenuBtn" href="#systems" role="button" class="btn"><i class="bi bi-grid me-2"></i>Systems</a>
        <a id="controlsMenuBtn" href="#admin/controls" role="button" class="btn"><i class="bi bi-sliders me-2"></i>Controls</a>
        <a id="transfersMenuBtn" href="#admin/transfers" role="button" class="btn"><i class="bi bi-arrow-left-right me-2"></i>Transfers</a>
        <a id="swarmMenuBtn" href="#admin/swarm" role="button" class="btn"><i class="bi bi-diagram-3 me-2"></i>Swarm</a>
        <a id="adminMenuBtn" href="#admin" role="button" class="btn"><i class="bi bi-shield-check me-2"></i>Admin</a>
      </div>
    </div>
  </div>
  <div class="d-none">
    <h1 class="h3 mb-1"></h1>
    <div id="pageSubtitle" class="text-muted"></div>
  </div>
  <main>
    <div class="app-shell p-3 p-md-4">
      <div id="systemInfoBar" class="mb-3 d-flex flex-wrap gap-2"></div>
      <div id="content"></div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/drone.js?v={{DRONE_APP_VERSION}}"></script>
</body>
</html>
