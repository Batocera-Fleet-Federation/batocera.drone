name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  # test:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: "3.11"
  #     - name: Run tests
  #       run: PYTHONPATH=. python -m unittest discover tests

  image:
    runs-on: ubuntu-latest
    # needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: ./scripts/docker-publish.sh ${{ github.event_name == 'push' && '--push' || '--dry-run' }}
